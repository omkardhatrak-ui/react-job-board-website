<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jobs Near You | JobFinder</title>
    <link rel="stylesheet" href="./styles.css">
</head>
<body>

<nav class="navbar">

        <svg viewBox="0 0 320 120" aria-hidden="true" focusable="false">
            <defs>
                <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#5dd5ff"/>
                    <stop offset="100%" stop-color="#9b7bff"/>
                </linearGradient>
            </defs>

            <circle class="halo" cx="60" cy="50" r="26"/>
            <circle class="pulse" cx="60" cy="50" r="18"/>

            <path class="pin"
                  d="M60 10
                     C40 10, 30 30, 30 45
                     C30 70, 60 95, 60 95
                     C60 95, 90 70, 90 45
                     C90 30, 80 10, 60 10Z"/>

            <rect class="briefcase" x="50" y="38" width="20" height="14" rx="2"/>
            <rect class="briefcase" x="56" y="34" width="8" height="4"/>

            <text class="logo-text-svg" x="120" y="60">JobFinder</text>
        </svg>
    </div>

    <div class="nav-links">
        <a href="./home.html">Home</a>
        <a href="#">Jobs</a>
        <a href="#">Companies</a>
        <a href="./login.html" class="login">Login</a>
        <a href="./forms.html"><button class="btn">Register</button></a>
    </div>
</nav>

<main class="map-page">
    <section class="map-header">
        <h1 id="results-title">Jobs Near You</h1>
        <p id="results-subtitle">Searching nearby openings...</p>
    </section>

    <section class="map-layout">
        <div class="map-panel">
            <h2>Google Map</h2>
            <iframe id="map-frame" title="Google map for selected location" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>

        <div class="jobs-panel">
            <h2>Available Jobs</h2>
            <p id="center-note" class="center-note"></p>
            <div class="filter-bar">
                <label class="filter-pill">
                    <span>Radius</span>
                    <select id="radius-filter">
                        <option value="0-50">Within 50 km</option>
                        <option value="0-5">0-5 km</option>
                        <option value="5-10">5-10 km</option>
                        <option value="10-15">10-15 km</option>
                        <option value="15-20">15-20 km</option>
                        <option value="20-25">20-25 km</option>
                        <option value="25-30">25-30 km</option>
                        <option value="30-35">30-35 km</option>
                        <option value="35-40">35-40 km</option>
                        <option value="40-45">40-45 km</option>
                        <option value="45-50">45-50 km</option>
                    </select>
                </label>

                <label class="filter-pill">
                    <span>Pay</span>
                    <select id="pay-filter">
                        <option value="any">Any</option>
                        <option value="unpaid">Unpaid</option>
                        <option value="10-20">10k-20k</option>
                        <option value="20-30">20k-30k</option>
                        <option value="30-50">30k-50k</option>
                        <option value="50-75">50k-75k</option>
                        <option value="75-100">75k-100k</option>
                        <option value="100-150">100k-150k</option>
                        <option value="150-200">150k-200k</option>
                    </select>
                </label>

                <label class="filter-pill">
                    <span>Skills</span>
                    <select id="skills-filter">
                        <option value="any">Any</option>
                        <option value="frontend">Front End</option>
                        <option value="backend">Back End</option>
                        <option value="database">Data Base</option>
                        <option value="devops">DevOps</option>
                        <option value="aws">AWS</option>
                        <option value="infra">Infra</option>
                    </select>
                </label>

                <label class="filter-pill">
                    <span>Work Mode</span>
                    <select id="mode-filter">
                        <option value="any">Any</option>
                        <option value="remote">Remote</option>
                        <option value="hybrid">Hybrid</option>
                        <option value="onsite">Onsite</option>
                    </select>
                </label>

                <label class="filter-pill">
                    <span>Date Posted</span>
                    <select id="date-filter">
                        <option value="any">Any</option>
                        <option value="24">Less than 24 hrs</option>
                        <option value="168">Last 7 days</option>
                        <option value="336">Last 14 days</option>
                        <option value="720">Last 1 month</option>
                    </select>
                </label>
            </div>

            <p id="filter-summary" class="center-note"></p>
            <ul id="filtered-jobs" class="job-list"></ul>
        </div>
    </section>
</main>

<footer class="copyright">
    &copy; 2026 JobFinder. All rights reserved.
</footer>

<script>
    const params = new URLSearchParams(window.location.search);
    const selectedLocation = (params.get("location") || "").trim();
    const keyword = (params.get("keyword") || "").trim();
    const normalizedKeyword = keyword.toLowerCase();
    const userLat = Number.parseFloat(params.get("userLat"));
    const userLng = Number.parseFloat(params.get("userLng"));
    const hasUserCoords = Number.isFinite(userLat) && Number.isFinite(userLng);

    const titleEl = document.getElementById("results-title")
    const subtitleEl = document.getElementById("results-subtitle");
    const centerNoteEl = document.getElementById("center-note");
    const mapFrame = document.getElementById("map-frame");
    const jobsListEl = document.getElementById("filtered-jobs");
    const filterSummaryEl = document.getElementById("filter-summary");
    const radiusFilterEl = document.getElementById("radius-filter");
    const payFilterEl = document.getElementById("pay-filter");
    const skillsFilterEl = document.getElementById("skills-filter");
    const modeFilterEl = document.getElementById("mode-filter");
    const dateFilterEl = document.getElementById("date-filter");

    const radiusBands = [
        { min: 0, max: 5 },
        { min: 5, max: 10 },
        { min: 10, max: 15 },
        { min: 15, max: 20 },
        { min: 20, max: 25 },
        { min: 25, max: 30 },
        { min: 30, max: 35 },
        { min: 35, max: 40 },
        { min: 40, max: 45 },
        { min: 45, max: 50 }
    ];

    const payOptions = [
        { key: "unpaid", unpaid: true, min: 0, max: 0, label: "Unpaid Internship" },
        { key: "10-20", unpaid: false, min: 10, max: 20, label: "10k-20k" },
        { key: "20-30", unpaid: false, min: 20, max: 30, label: "20k-30k" },
        { key: "30-50", unpaid: false, min: 30, max: 50, label: "30k-50k" },
        { key: "50-75", unpaid: false, min: 50, max: 75, label: "50k-75k" },
        { key: "75-100", unpaid: false, min: 75, max: 100, label: "75k-100k" },
        { key: "100-150", unpaid: false, min: 100, max: 150, label: "100k-150k" },
        { key: "150-200", unpaid: false, min: 150, max: 200, label: "150k-200k" }
    ];

    const skillsCatalog = [
        { key: "frontend", label: "Front End", titles: ["Frontend Developer", "React UI Engineer", "Web Experience Developer"], extraSkills: ["aws"] },
        { key: "backend", label: "Back End", titles: ["Backend Engineer", "API Developer", "Platform Services Engineer"], extraSkills: ["database"] },
        { key: "database", label: "Data Base", titles: ["Database Administrator", "Data Platform Analyst", "SQL Support Engineer"], extraSkills: ["backend"] },
        { key: "devops", label: "DevOps", titles: ["DevOps Engineer", "Release Automation Engineer", "SRE Associate"], extraSkills: ["aws", "infra"] },
        { key: "aws", label: "AWS", titles: ["AWS Platform Engineer", "Cloud Operations Engineer", "Solutions Cloud Specialist"], extraSkills: ["devops", "infra"] },
        { key: "infra", label: "Infra", titles: ["Infrastructure Specialist", "Systems Reliability Engineer", "Network and Infra Analyst"], extraSkills: ["aws", "devops"] }
    ];

    const modes = ["remote", "hybrid", "onsite"];
    const postedHourGroups = [12, 72, 240, 600];
    const companyPrefixes = ["Northstar", "BluePeak", "Orbit", "CloudNova", "Ironwood", "PixelRiver", "SummitGrid", "Harbor", "Atlas", "Brightlane"];
    const companySuffixes = ["Labs", "Systems", "Works", "Collective", "Stack", "Digital", "Partners", "Technologies"];

    const locationSeeds = {
        "new york": { lat: 40.7128, lng: -74.0060 },
        "los angeles": { lat: 34.0522, lng: -118.2437 },
        "chicago": { lat: 41.8781, lng: -87.6298 },
        "san francisco": { lat: 37.7749, lng: -122.4194 },
        "seattle": { lat: 47.6062, lng: -122.3321 },
        "boston": { lat: 42.3601, lng: -71.0589 },
        "austin": { lat: 30.2672, lng: -97.7431 },
        "miami": { lat: 25.7617, lng: -80.1918 },
        "dallas": { lat: 32.7767, lng: -96.7970 },
        "atlanta": { lat: 33.7490, lng: -84.3880 },
        "hyderabad": { lat: 17.3850, lng: 78.4867 },
        "bangalore": { lat: 12.9716, lng: 77.5946 },
        "bengaluru": { lat: 12.9716, lng: 77.5946 },
        "mumbai": { lat: 19.0760, lng: 72.8777 },
        "delhi": { lat: 28.6139, lng: 77.2090 },
        "pune": { lat: 18.5204, lng: 73.8567 },
        "chennai": { lat: 13.0827, lng: 80.2707 }
    };

    const capitalizeWords = (text) =>
        text.replace(/\b\w/g, (char) => char.toUpperCase());

    const hashString = (value) =>
        value.split("").reduce((total, char, index) => total + char.charCodeAt(0) * (index + 1), 0);

    const buildCompanyName = (seed) => {
        const prefix = companyPrefixes[seed % companyPrefixes.length];
        const suffix = companySuffixes[Math.floor(seed / companyPrefixes.length) % companySuffixes.length];
        return `${prefix} ${suffix}`;
    };

    const destinationFromDistance = (center, distanceKm, bearingDeg) => {
        const earthRadius = 6371;
        const br = toRad(bearingDeg);
        const lat1 = toRad(center.lat);
        const lng1 = toRad(center.lng);

        const lat2 = Math.asin(
            Math.sin(lat1) * Math.cos(distanceKm / earthRadius) +
            Math.cos(lat1) * Math.sin(distanceKm / earthRadius) * Math.cos(br)
        );

        const lng2 = lng1 + Math.atan2(
            Math.sin(br) * Math.sin(distanceKm / earthRadius) * Math.cos(lat1),
            Math.cos(distanceKm / earthRadius) - Math.sin(lat1) * Math.sin(lat2)
        );

        return { lat: (lat2 * 180) / Math.PI, lng: (lng2 * 180) / Math.PI };
    };

    const toRad = (value) => (value * Math.PI) / 180;
    const distanceKm = (aLat, aLng, bLat, bLng) => {
        const earthRadius = 6371;
        const dLat = toRad(bLat - aLat);
        const dLng = toRad(bLng - aLng);
        const s1 = Math.sin(dLat / 2) ** 2;
        const s2 = Math.cos(toRad(aLat)) * Math.cos(toRad(bLat)) * Math.sin(dLng / 2) ** 2;
        const c = 2 * Math.atan2(Math.sqrt(s1 + s2), Math.sqrt(1 - s1 - s2));
        return earthRadius * c;
    };

    const resolveLocationSeed = (locationText) => {
        const normalizedLocation = locationText.toLowerCase();
        const matchedKey = Object.keys(locationSeeds).find((key) => normalizedLocation.includes(key));
        if (matchedKey) {
            return locationSeeds[matchedKey];
        }

        const hash = hashString(normalizedLocation || "jobfinder");
        return {
            lat: 20 + (hash % 4000) / 100,
            lng: -130 + (hash % 26000) / 100
        };
    };

    const createDummyJobs = (center, locationLabel) => {
        const dummy = [];
        const locationSeed = hashString(`${locationLabel}-${center.lat.toFixed(3)}-${center.lng.toFixed(3)}`);
        const readableLocation = locationLabel ? capitalizeWords(locationLabel) : "Current Location";

        radiusBands.forEach((band, bandIndex) => {
            const centerDistance = (band.min + band.max) / 2;

            modes.forEach((mode, modeIndex) => {
                skillsCatalog.forEach((skillEntry, skillIndex) => {
                    payOptions.forEach((payOpt, payIndex) => {
                        postedHourGroups.forEach((postedHours, timeIndex) => {
                            const uniqueSeed = locationSeed + bandIndex * 1000 + modeIndex * 300 + skillIndex * 50 + payIndex * 7 + timeIndex;
                            const bearing = (uniqueSeed * 29) % 360;
                            const point = destinationFromDistance(center, centerDistance, bearing);
                            const titleOptions = skillEntry.titles;
                            const title = titleOptions[uniqueSeed % titleOptions.length];
                            const relatedSkills = [skillEntry.key, ...skillEntry.extraSkills.slice(0, (uniqueSeed % 2) + 1)];
                            const paySpread = payOpt.max - payOpt.min;
                            const payK = payOpt.unpaid ? 0 : payOpt.min + (paySpread === 0 ? 0 : uniqueSeed % (paySpread + 1));

                            dummy.push({
                                id: `${bandIndex}-${mode}-${skillEntry.key}-${payOpt.key}-${timeIndex}`,
                                title,
                                company: buildCompanyName(uniqueSeed),
                                lat: point.lat,
                                lng: point.lng,
                                payK,
                                unpaid: payOpt.unpaid,
                                skills: [...new Set(relatedSkills)],
                                mode,
                                postedHours,
                                locationName: readableLocation
                            });
                        });
                    });
                });
            });
        });

        return dummy;
    };

    const renderJobs = (list) => {
        const visibleJobs = list.slice(0, 120);
        jobsListEl.innerHTML = "";
        if (!list.length) {
            jobsListEl.innerHTML = '<li class="job-empty">No jobs found for selected filters.</li>';
            filterSummaryEl.textContent = "0 jobs match your filters.";
            return;
        }

        filterSummaryEl.textContent = list.length > visibleJobs.length
            ? `${list.length} job(s) found. Showing the closest ${visibleJobs.length}.`
            : `${list.length} job(s) found.`;
        visibleJobs.forEach((job) => {
            const item = document.createElement("li");
            item.className = "job-item";
            item.innerHTML = `
                <strong>${job.title}</strong>
                <span>${job.company}</span>
                <span>${job.locationName || "Near your search"} | ${job.distance.toFixed(1)} km away | ${job.mode} | ${job.unpaid ? "Unpaid" : `${job.payK}k`}</span>
                <span>Skills: ${job.skills.join(", ")} | Posted: ${Math.ceil(job.postedHours / 24)} day(s) ago</span>
            `;
            jobsListEl.appendChild(item);
        });
    };



    const parseRange = (value) => {
        const [min, max] = value.split("-").map(Number);
        return { min, max };
    };

    const inPayRange = (job, payFilter) => {
        if (payFilter === "any") return true;
        if (payFilter === "unpaid") return job.unpaid;
        if (job.unpaid) return false;
        const { min, max } = parseRange(payFilter);
        return job.payK >= min && job.payK <= max;
    };

    const applyFilters = (scoredJobs) => {
        const radiusRange = parseRange(radiusFilterEl.value);
        const payFilter = payFilterEl.value;
        const skillsFilter = skillsFilterEl.value;
        const modeFilter = modeFilterEl.value;
        const dateFilterHours = dateFilterEl.value === "any" ? null : Number(dateFilterEl.value);

        return scoredJobs
            .filter((job) => job.distance >= radiusRange.min && job.distance <= radiusRange.max)
            .filter((job) => inPayRange(job, payFilter))
            .filter((job) => skillsFilter === "any" || job.skills.includes(skillsFilter))
            .filter((job) => modeFilter === "any" || job.mode === modeFilter)
            .filter((job) => dateFilterHours === null || job.postedHours <= dateFilterHours)
            .filter((job) => {
                if (!normalizedKeyword) return true;
                const target = `${job.title} ${job.company} ${job.skills.join(" ")}`.toLowerCase();
                return target.includes(normalizedKeyword);
            })
            .sort((a, b) => a.distance - b.distance);
    };

    const setMap = (locationText) => {
        const mapQuery = encodeURIComponent(locationText);
        mapFrame.src = `https://www.google.com/maps?q=${mapQuery}&output=embed`;
    };

    const setMapByCoords = (lat, lng) => {
        mapFrame.src = `https://www.google.com/maps?q=${lat},${lng}&z=13&output=embed`;
    };

    const setMapFallback = (locationText, fallbackCenter) => {
        if (locationText) {
            setMap(locationText);
            return;
        }

        setMapByCoords(fallbackCenter.lat, fallbackCenter.lng);
    };

    const geocodeLocation = async (locationText) => {
        const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(locationText)}`;
        const response = await fetch(url, {
            headers: {
                "Accept": "application/json"
            }
        });

        if (!response.ok) {
            throw new Error("Unable to geocode location");
        }

        const data = await response.json();
        if (!data.length) {
            throw new Error("No matching location found");
        }

        return {
            lat: Number.parseFloat(data[0].lat),
            lng: Number.parseFloat(data[0].lon)
        };
    };

    const run = async () => {
        if (!selectedLocation && !hasUserCoords && !keyword) {
            titleEl.textContent = "Location Missing";
            subtitleEl.textContent = "Please go back and enter a location or allow geolocation.";
            centerNoteEl.textContent = "No location input, keyword, or geolocation found.";
            renderJobs([]);
            return;
        }

        const displayLocation = selectedLocation || "your current location";
        titleEl.textContent = keyword
            ? `${keyword} jobs near ${displayLocation}`
            : `Jobs near ${displayLocation}`;
        subtitleEl.textContent = "Showing openings based on your location radius.";

        let center;
        const hasSelectedLocation = Boolean(selectedLocation);

        if (hasSelectedLocation) {
            try {
                center = await geocodeLocation(selectedLocation);
                centerNoteEl.textContent = `Using entered location (${selectedLocation}) as search center.`;
                setMap(selectedLocation);
            } catch (e) {
                if (hasUserCoords) {
                    center = { lat: userLat, lng: userLng };
                    centerNoteEl.textContent = "Unable to geocode entered location; using browser geolocation as search center.";
                    setMapByCoords(userLat, userLng);
                } else {
                    center = resolveLocationSeed(selectedLocation);
                    centerNoteEl.textContent = `Using generated local data for ${selectedLocation} because live geocoding was unavailable.`;
                    setMapFallback(selectedLocation, center);
                }
            }
        } else if (hasUserCoords) {
            center = { lat: userLat, lng: userLng };
            centerNoteEl.textContent = "Using your browser geolocation as search center.";
            setMapByCoords(userLat, userLng);
        } else if (keyword) {
            center = resolveLocationSeed("remote jobs");
            centerNoteEl.textContent = "Showing generated sample jobs because no location was provided.";
            setMapFallback("", center);
        } else {
            throw new Error("No location data available.");
        }

        const allJobs = createDummyJobs(center, selectedLocation || "current location");
        const nearby = allJobs
            .map((job) => ({
                ...job,
                distance: distanceKm(center.lat, center.lng, job.lat, job.lng)
            }))
            .filter((job) => job.distance <= 50);

        const refresh = () => {
            const filtered = applyFilters(nearby);
            renderJobs(filtered);
        };

        [radiusFilterEl, payFilterEl, skillsFilterEl, modeFilterEl, dateFilterEl].forEach((filterEl) => {
            filterEl.addEventListener("change", refresh);
        });

        refresh();
    };

    run().catch(() => {
        subtitleEl.textContent = "Could not load nearby jobs for this location.";
        centerNoteEl.textContent = "Try another city or check your network connection.";
        renderJobs([]);
    });
</script>

</body>
</html>
